# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  ARCH:
    sh: |
      case $(uname -m) in
        x86_64) echo "amd64" ;;
        aarch64|arm64) echo "arm64" ;;
        *) echo "amd64" ;;
      esac
  SUDO:
    sh: "[ $(id -u) -ne 0 ] && echo 'sudo' || echo ''"
  GOPATH:
    sh: go env GOPATH || echo "$HOME/go"
  PKG_MGR:
    sh: |
      if command -v apt-get >/dev/null; then echo "apt";
      elif command -v yum >/dev/null; then echo "yum";
      else echo "unknown"; fi
  GH_PROXY:
    sh: "[ -f .install_optimize ] && echo 'https://gh-proxy.org/' || echo ''"
  NODE_URL_BASE:
    sh: |
      if [ -f .install_optimize ]; then
        echo "https://mirrors.tuna.tsinghua.edu.cn/nodejs-release/"
      else
        echo "https://nodejs.org/dist"
      fi

tasks:
  optimize:china:
    desc: "一键切换为国内镜像源 (APT, Go, NPM, GitHub)"
    deps: [install:go, install:nodejs]
    cmds:
      - touch .install_optimize
      - |
        if [ "{{.PKG_MGR}}" == "apt" ]; then
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            {{.SUDO}} sed -i 's/\(archive\|security\).ubuntu.com/mirrors.aliyun.com/g' /etc/apt/sources.list.d/ubuntu.sources
          else
            {{.SUDO}} sed -i 's/http:\/\/.*.ubuntu.com/http:\/\/mirrors.aliyun.com/g' /etc/apt/sources.list
          fi
          {{.SUDO}} apt update
        fi
      - go env -w GOPROXY=https://goproxy.cn,direct
      - npm config set registry https://mirrors.cloud.tencent.com/npm/ || true
      - echo "Download optimization complete."

  install:
    desc: Install all tool chains
    deps: [install:nodejs, install:go]
    cmds:
      - task: install:step_2
  
  install:step_2:
    internal: true
    deps: [install:pnpm,install:go-tools,install:packages,install:upx]
    cmds:
      - go mod tidy

  install:base-tools:apt:
    internal: true
    cmds:
      - "{{.SUDO}} apt update"
      - "{{.SUDO}} apt install -y curl git xz-utils "
      
  install:base-tools:yum:
    internal: true
    cmds:
      - yum install -y
  
  install:nodejs:
    internal: true
    deps: ["install:base-tools:{{.PKG_MGR}}"]
    vars:
      NODE_VER: "v24.1.0"
      NODE_ARCH:
        sh: |
          case $(uname -m) in
            x86_64) echo "x64" ;;
            aarch64|arm64) echo "arm64" ;;
            *) echo "x64" ;;
          esac
    status:
      - command -v node
      - command -v npm
    cmds:
      - echo "Installing Node.js {{.NODE_VER}} from {{.NODE_URL_BASE}}..."
      - |
        URL="{{.NODE_URL_BASE}}/{{.NODE_VER}}/node-{{.NODE_VER}}-linux-{{.NODE_ARCH}}.tar.xz"
        curl -sSL "$URL" | {{.SUDO}} tar -xJ -C /usr/local/ --strip-components=1
      - node -v
      - npm -v

  install:go:
    internal: true
    status:
      - command -v go
    vars:
      GO_VER: "1.25.8"
    cmds:
      - echo "Installing Go {{.GO_VER}} for {{.ARCH}}..."
      - curl -sSL "https://go.dev/dl/go{{.GO_VER}}.linux-{{.ARCH}}.tar.gz" | {{.SUDO}} tar -xz -C /usr/local/
      - "{{.SUDO}} ln -sf /usr/local/go/bin/go /usr/bin/go"
      - "{{.SUDO}} ln -sf /usr/local/go/bin/gofmt /usr/bin/gofmt"
      - go version

  install:upx:
    internal: true
    vars:
      UPX_VER: "5.1.1"
    status:
      - command -v upx
    cmds:
      - |
        [[ $(uname -m) == "x86_64" ]] && ARCH="amd64" || ARCH="arm64"
        URL="{{.GH_PROXY}}https://github.com/upx/upx/releases/download/v{{.UPX_VER}}/upx-{{.UPX_VER}}-${ARCH}_linux.tar.xz"
        echo "Downloading from $URL"
        curl -L "$URL" | {{.SUDO}} tar -xJ --strip-components=1 -C /usr/local/bin/ upx-{{.UPX_VER}}-${ARCH}_linux/upx

  install:packages:
    internal: true
    desc: Install apt packages if missing
    cmds:
      - task: "install:packages:{{.PKG_MGR}}"

  install:packages:apt:
    internal: true
    status:
      - dpkg -s libbpf-dev libelf-dev build-essential
    cmds:
      - >
        {{.SUDO}} DEBIAN_FRONTEND=noninteractive apt install -y 
        clang llvm gcc-multilib build-essential 
        libbpf-dev libelf-dev 
        $(uname -r | grep -qi microsoft && echo "linux-headers-generic" || echo "linux-headers-$(uname -r)")

  install:packages:yum:
    internal: true
    status:
      - rpm -q libbpf-devel elfutils-libelf-devel
    cmds:
      - '{{.SUDO}} yum groupinstall -y "Development Tools"'
      - "{{.SUDO}} yum install -y clang llvm elfutils-libelf-devel libbpf-devel kernel-devel"

  install:go-tools:
    internal: true
    desc: Install Go based tools
    status:
      - test -f {{.GOPATH}}/bin/bpf2go
      - test -f {{.GOPATH}}/bin/lefthook
    cmds:
      - go get -tool github.com/cilium/ebpf/cmd/bpf2go@latest
      - "{{.SUDO}} ln -sf {{.GOPATH}}/bin/bpf2go /usr/bin/bpf2go"
      - "{{.SUDO}} npm i -g @evilmartians/lefthook"
      - "{{.SUDO}} npm i -g @goreleaser/goreleaser"

  install:pnpm:
    internal: true
    status:
      - command -v pnpm
    cmds:
      - "{{.SUDO}} npm install -g pnpm@latest-10"

  build:
    desc: 使用 GoReleaser 构建 (默认全跑, 可选 --frontend 或 --backend)
    deps: [install]
    summary: |
      no args: build all
      --frontend: only build frontend
      --backend: build all (backend depends on frontend)
    cmds:
      - "{{if eq .CLI_ARGS ``}} goreleaser release --snapshot --clean {{end}}"

  build-frontend:
    desc: Build frontend
    deps: [install:pnpm]
    cmds:
      - bash scripts/build-frontend.sh

  code-check:
    desc: Code check
    dir: backend
    deps: [code-check:install]
    cmds:
      # - lefthook run
      - golangci-lint run --fix
      - go test ./...

  code-check:install:
    internal: true
    desc: Install check golang code tool chains
    status:
      - command -v gosec
      - command -v golangci-lint
      - command -v gofmt
    cmds:
      - go get -tool github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - go get -tool honnef.co/go/tools/cmd/staticcheck@latest

  pre-commit:
    desc: pre-commit
    deps: [install:go-tools]
    cmds:
      - lefthook install
