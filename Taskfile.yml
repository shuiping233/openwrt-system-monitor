# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  # 获取 GOPATH，如果为空则默认为 ~/go
  GOPATH:
    sh: go env GOPATH || echo "$HOME/go"
  PKG_MGR:
    sh: |
      if command -v apt-get >/dev/null; then echo "apt";
      elif command -v yum >/dev/null; then echo "yum";
      else echo "unknown"; fi

tasks:
  install:
    desc: Install all tool chains
    deps: [install:packages, install:pnpm, install:tools]
    cmds:
      - go mod tidy
      - lefthook install

  install:go:
    internal: true
    status:
      - command -v go
    vars:
      GO_VER: "1.25.8"
      ARCH:
        sh: |
          case $(uname -m) in
            x86_64) echo "amd64" ;;
            aarch64|arm64) echo "arm64" ;;
            *) echo "amd64" ;;
          esac
    cmds:
      - echo "Installing Go {{.GO_VER}} for {{.ARCH}}..."
      - curl -sSL "https://go.dev/dl/go{{.GO_VER}}.linux-{{.ARCH}}.tar.gz" | sudo tar -xz -C /usr/local/
      - sudo ln -sf /usr/local/go/bin/go /usr/bin/go
      - sudo ln -sf /usr/local/go/bin/gofmt /usr/bin/gofmt
      - go version

  install:packages:
    internal: true
    desc: Install apt packages if missing
    cmds:
      - task: "install:packages:{{.PKG_MGR}}"
    
  install:packages:apt:
    internal: true
    status:
      - dpkg -s libbpf-dev libelf-dev build-essential
    cmds:
      - sudo apt update
      - >
        sudo apt install -y 
        clang llvm gcc-multilib build-essential 
        libbpf-dev libelf-dev 
        linux-headers-$(uname -r)

  install:packages:yum:
    internal: true
    status:
      - rpm -q libbpf-devel elfutils-libelf-devel
    cmds:
      - sudo yum groupinstall -y "Development Tools"
      - sudo yum install -y clang llvm elfutils-libelf-devel libbpf-devel kernel-devel

  install:tools:
    internal: true
    desc: Install Go based tools
    deps: [install:go]
    status:
      - test -f {{.GOPATH}}/bin/bpf2go
      - test -f {{.GOPATH}}/bin/lefthook
    cmds:
      - go install github.com/cilium/ebpf/cmd/bpf2go@latest
      - go install github.com/evilmartians/lefthook@latest

  install:nodejs:
    internal: true
    status:
      - command -v node
    cmds:
      - '{{if eq .PKG_MGR "apt"}} curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash - && sudo apt install -y nodejs {{end}}'
      - '{{if eq .PKG_MGR "yum"}} sudo yum install -y nodejs {{end}}'

  install:pnpm:
    internal: true
    deps: [install:nodejs]
    status:
      - command -v pnpm
    cmds:
      - sudo npm install -g pnpm@latest-10

  build:
    desc: 使用 GoReleaser 构建 (默认全跑, 可选 --frontend 或 --backend)
    deps: [install]
    summary: |
      no args: build all
      --frontend: only build frontend
      --backend: build all (backend depends on frontend)
    cmds:
      - "{{if eq .CLI_ARGS ``}} goreleaser release --snapshot --clean {{end}}"
  
  build-frontend:
    desc: Build frontend
    deps: [install:pnpm]
    cmds : 
      - bash scripts/build-frontend.sh

  code-check:
    desc: Code check
    dir: backend
    deps: [code-check:install]
    cmds:
      # - lefthook run
      - golangci-lint run --fix
      - go test ./...

  code-check:install:
    internal: true
    desc: Install check golang code tool chains
    status:
      - command -v gosec
      - command -v golangci-lint
      - command -v gofmt
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - go install honnef.co/go/tools/cmd/staticcheck@latest
